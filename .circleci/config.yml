version: 2.1

orbs:
  node: circleci/node@7.2.1
  coveralls: coveralls/coveralls@2.2.5
jobs:
  build_and_test:
    docker:
      - image: cimg/node:26.0              # primary container
      - image: cimg/postgres:16.0           # sidecar — reachable at localhost:5432
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: $POSTGRES_PASSWORD
          POSTGRES_DB: home_challenge_test

    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:$POSTGRES_PASSWORD@localhost:5432/home_challenge_test
      JWT_SECRET: $JWT_SECRET
      JWT_REFRESH_SECRET: $JWT_REFRESH_SECRET
      POKE_BASE_API: https://pokeapi.co/api/v2/pokemon

    steps:
      - checkout

      - node/install-packages:
          pkg-manager: npm

      - run:
          name: Generate Prisma Client
          command: npx prisma generate

      - run:
          name: Wait for Postgres
          command: dockerize -wait tcp://localhost:5432 -timeout 30s

      - run:
          name: Run migrations
          command: npx prisma migrate deploy

      - run:
          name: Run e2e tests
          command: npm run test:e2e

      - run:
          name: Build app
          command: npm run build

      - persist_to_workspace:
          root: ~/project
          paths: .

workflows:
  build_test_deploy:
    jobs:
      - build_and_test